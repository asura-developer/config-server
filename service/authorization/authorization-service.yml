# =============================================================================
# AUTHORIZATION SERVICE CONFIGURATION - DEV DEFAULT
# =============================================================================

server:
  port: 7081

spring:
  application:
    name: authorization-service

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
