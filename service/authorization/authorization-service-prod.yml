server:
  port: 7081

# =============================================================================
# AUTHORIZATION SERVICE CONFIGURATION - PRODUCTION ENVIRONMENT
# =============================================================================

spring:
  application:
    name: authorization-service

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: "authorization-service"
    description: "TL Express Authorization Service - PROD"
    version: "1.0.0"
