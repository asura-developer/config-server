# =============================================================================
# DEFAULT ENVIRONMENT CONFIGURATION
# =============================================================================

server:
  port: 7083

spring:
  application:
    name: company-service
# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
