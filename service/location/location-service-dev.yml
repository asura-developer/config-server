server:
  port: 7084

# =============================================================================
# LOCATION SERVICE CONFIGURATION - DEV ENVIRONMENT
# =============================================================================

spring:
  application:
    name: location-service

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: "location-service"
    description: "TL Express Location Service - DEV"
    version: "1.0.0"
