server:
  port: 7087

# =============================================================================
# CUSTOMER SERVICE CONFIGURATION - DEV ENVIRONMENT
# =============================================================================

spring:
  application:
    name: customer-service

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: "customer-service"
    description: "TL Express Customer Service - DEV"
    version: "1.0.0"
