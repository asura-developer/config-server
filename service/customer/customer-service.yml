# =============================================================================
# CUSTOMER SERVICE CONFIGURATION - DEV DEFAULT
# =============================================================================

server:
  port: 7087

spring:
  application:
    name: customer-service
# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
