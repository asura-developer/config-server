# =============================================================================
# GATEWAY SERVER CONFIGURATION - DEV DEFAULT
# =============================================================================

server:
  port: 8081

spring:
  application:
    name: customer-gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
    eureka-server-connect-timeout-seconds: 10
  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}  # ← ADD THIS
    hostname: ${spring.application.name}                     # ← ADD THIS
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      zone: ${ZONE:default}
